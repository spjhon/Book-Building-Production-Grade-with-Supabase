<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicia sesión en tu cuenta</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f9fafb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px; margin: 60px auto; background-color: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);">
    
    <tr>
      <td style="padding: 40px 40px 0 40px; text-align: center;">
        <div style="display: inline-block; width: 40px; height: 40px; background-color: #111827; border-radius: 10px;">
           <span style="color: white; font-size: 20px; font-weight: bold; line-height: 40px;">M</span>
        </div>
      </td>
    </tr>

    <tr>
      <td style="padding: 30px 40px 40px 40px; text-align: center;">
        <h1 style="color: #111827; font-size: 22px; font-weight: 700; margin: 0 0 12px 0;">
          Enlace de acceso rápido
        </h1>
        <p style="color: #6b7280; font-size: 15px; line-height: 24px; margin: 0 0 32px 0;">
          Haz clic en el botón de abajo para iniciar sesión de forma segura. Este enlace es de un solo uso y expirará pronto.
        </p>
        
        <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%">
          <tr>
            <td align="center">
              <a href="{{ .RedirectTo }}&token_hash={{ .TokenHash }}&type=email" target="_blank" style="background-color: #111827; color: #ffffff; padding: 12px 24px; font-size: 15px; font-weight: 600; text-decoration: none; border-radius: 6px; display: inline-block; width: 80%;">
                Entrar a la plataforma
              </a>
            </td>
          </tr>
        </table>

        <p style="margin-top: 35px; color: #9ca3af; font-size: 12px;">
          ¿Tienes problemas? <a href="{{ .RedirectTo }}&token_hash={{ .TokenHash }}&type=email" style="color: #111827; text-decoration: underline;">Usa este enlace directo</a>
        </p>
      </td>
    </tr>

    <tr>
      <td style="padding-bottom: 40px; text-align: center;">
        <p style="color: #9ca3af; font-size: 11px; margin: 0;">
          Si no solicitaste este enlace, puedes borrar este correo tranquilamente.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
